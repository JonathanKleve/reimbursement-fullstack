<nav class="navbar">
  <div class="nav-brand">Reimbursement System</div>
  
  <div class="nav-links">
    @if (authService.currentUser$ | async; as user) {
      <a routerLink="/reimbursements" routerLinkActive="active-link">My Requests</a>
      
      @if (user.role === 'MANAGER') {
        <a routerLink="/users" routerLinkActive="active-link">User Management</a>
      }
      
      <span class="welcome-text">Welcome, {{ user.username }}</span>
      <button (click)="logout()" class="logout-btn">Logout</button>
    }
  </div>
</nav>
